<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moo-TV LEGENDARY</title>
    <style>
        /* TEMEL AYARLAR */
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; user-select: none; }
        body { background: #b6db66; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }

        /* ARAYUZ KATMANI */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* UST BAR (Kaynaklar) */
        .top-bar {
            position: absolute; top: 20px; left: 20px;
            display: flex; gap: 15px; pointer-events: auto;
        }
        .res-box {
            background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 20px;
            color: white; font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 8px;
            border: 2px solid rgba(0,0,0,0.2);
        }
        .icon { width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.3); }

        /* ENVANTER (Silah / Yemek) */
        #inventory {
            position: absolute; bottom: 20px; left: 20px;
            display: flex; gap: 10px; pointer-events: auto;
        }
        .inv-slot {
            width: 70px; height: 70px; background: rgba(0,0,0,0.5); border: 4px solid #333;
            border-radius: 12px; cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: 0.1s;
        }
        .inv-slot.active { border-color: #f1c40f; background: rgba(241, 196, 15, 0.2); transform: scale(1.1); }
        .inv-key { position: absolute; top: 2px; left: 5px; color: #fff; font-size: 12px; font-weight: bold; }

        /* INSAAT MENUSU */
        #build-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; pointer-events: auto;
        }
        .build-item {
            width: 60px; height: 60px; background: rgba(0,0,0,0.5); border: 3px solid #555;
            border-radius: 10px; cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .build-item.selected { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        .cost { position: absolute; bottom: 2px; right: 2px; font-size: 10px; color: #fff; font-weight: bold; }

        /* MARKET BUTONU */
        #shop-btn {
            position: absolute; top: 20px; right: 20px;
            background: #3498db; color: white; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            border: 3px solid #2980b9; pointer-events: auto;
        }

        /* MARKET MENUSU (MODAL) */
        #shop-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 80%; background: rgba(0,0,0,0.9);
            border-radius: 15px; border: 4px solid #3498db;
            display: none; flex-direction: column; padding: 20px; pointer-events: auto; z-index: 50;
        }
        #shop-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px; overflow-y: auto; padding: 10px;
        }
        .shop-item {
            background: #222; border: 2px solid #444; border-radius: 8px;
            padding: 10px; text-align: center; color: white; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }
        .shop-item:hover { background: #333; border-color: #fff; }
        .shop-item.equipped { border-color: #2ecc71; background: #145a32; }
        .hat-preview { width: 50px; height: 50px; background: #ddd; border-radius: 50%; margin-bottom: 10px; position: relative; }
        .close-shop {
            align-self: flex-end; background: #c0392b; color: white; padding: 5px 15px;
            border: none; border-radius: 5px; cursor: pointer; margin-bottom: 10px;
        }

        /* BILDIRIM */
        .notify {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 10px 20px;
            border-radius: 5px; opacity: 0; transition: 0.5s; pointer-events: none;
        }

    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <!-- Kaynaklar & Gold -->
        <div class="top-bar">
            <div class="res-box"><div class="icon" style="background:#a56d38"></div> <span id="wood-val">0</span></div>
            <div class="res-box"><div class="icon" style="background:#7f8c8d"></div> <span id="stone-val">0</span></div>
            <div class="res-box"><div class="icon" style="background:#e74c3c"></div> <span id="food-val">0</span></div>
            <div class="res-box" style="border-color:#f1c40f; color:#f1c40f;">💰 <span id="gold-val">0</span></div>
        </div>

        <!-- Market Butonu -->
        <button id="shop-btn" onclick="toggleShop()">MARKET (Şapka)</button>

        <!-- Envanter -->
        <div id="inventory">
            <div class="inv-slot active" id="slot-0" onclick="selectSlot(0)">
                <span class="inv-key">1</span>
                <div style="width:30px; height:30px; background:#8e44ad; border-radius:4px;"></div> <!-- Balta -->
            </div>
            <div class="inv-slot" id="slot-1" onclick="selectSlot(1)">
                <span class="inv-key">2</span>
                <div style="width:30px; height:30px; background:#e74c3c; border-radius:50%;"></div> <!-- Elma -->
            </div>
        </div>

        <!-- Insaat -->
        <div id="build-bar">
            <div class="build-item" id="btn-wall" onclick="selectBuild('wall')">
                <div style="width:25px;height:25px;background:#555;"></div> <span class="cost">10W</span>
            </div>
            <div class="build-item" id="btn-spike" onclick="selectBuild('spike')">
                <div style="width:0;height:0;border:10px solid transparent;border-bottom:20px solid #777;"></div> <span class="cost">15S</span>
            </div>
            <div class="build-item" id="btn-trap" onclick="selectBuild('trap')">
                <div style="width:25px;height:25px;border-radius:50%;border:3px solid #a56d38;"></div> <span class="cost">30W</span>
            </div>
        </div>

        <div id="notify" class="notify">Yetersiz Kaynak!</div>
    </div>

    <!-- MARKET MODAL -->
    <div id="shop-modal">
        <button class="close-shop" onclick="toggleShop()">KAPAT X</button>
        <div style="color:white; margin-bottom:10px;">Şapkanı Seç (Sadece 1 tane takılır)</div>
        <div id="shop-grid"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- OYUN SABITLERI ---
        const mapSize = 5000; // Dev Harita
        const player = {
            x: 0, y: 0, angle: 0, radius: 25, speed: 4, baseSpeed: 4,
            health: 100, maxHealth: 100,
            wood: 0, stone: 0, food: 0, gold: 5000, score: 0,
            activeSlot: 0, // 0: Weapon, 1: Food
            hat: null, // Takili sapka ID
            attacking: false, weaponAngle: 0,
            eatCooldown: 0
        };
        const cam = { x: 0, y: 0 };
        
        // --- HAT LISTESI (15 Adet) ---
        const hats = [
            { id: 1, name: "Booster Hat", price: 1000, desc: "Hızını artırır", color: "#7f8c8d", type: "speed", val: 1.5 },
            { id: 2, name: "Stone Helmet", price: 1500, desc: "Hasarı azaltır", color: "#95a5a6", type: "def", val: 0.8 },
            { id: 3, name: "Apple Hat", price: 2000, desc: "Yavaşça can yeniler", color: "#e74c3c", type: "regen", val: 0.05 },
            { id: 4, name: "Spike Gear", price: 2500, desc: "Sana vurana hasar ver", color: "#34495e", type: "thorns", val: 1 },
            { id: 5, name: "Bushido", price: 3000, desc: "Daha hızlı vurursun", color: "#2c3e50", type: "atkSpd", val: 1.5 },
            { id: 6, name: "Miner Hat", price: 3500, desc: "Taşlardan x2 al", color: "#f39c12", type: "stone", val: 2 },
            { id: 7, name: "Lumberjack", price: 3500, desc: "Ağaçlardan x2 al", color: "#d35400", type: "wood", val: 2 },
            { id: 8, name: "Soldier", price: 4000, desc: "Daha az geri tepme", color: "#27ae60", type: "stable", val: 0.5 },
            { id: 9, name: "Empower", price: 5000, desc: "Daha çok hasar ver", color: "#8e44ad", type: "dmg", val: 1.3 },
            { id: 10, name: "Scout Cap", price: 1000, desc: "Görüş alanı artar", color: "#16a085", type: "vision", val: 1.2 },
            { id: 11, name: "Thief Gear", price: 6000, desc: "Daha çok altın", color: "#2c3e50", type: "gold", val: 1.5 },
            { id: 12, name: "Medic", price: 4500, desc: "Yemekler x2 can verir", color: "#fff", type: "heal", val: 2 },
            { id: 13, name: "Immunity", price: 8000, desc: "Zehir işlemez", color: "#e67e22", type: "immune", val: 1 },
            { id: 14, name: "Winter Cap", price: 2000, desc: "Yavaşlamazsın", color: "#3498db", type: "snow", val: 1 },
            { id: 15, name: "KING CROWN", price: 20000, desc: "HER ŞEY X2", color: "gold", type: "god", val: 2 }
        ];

        let objects = [];
        let enemies = [];
        let buildings = [];
        let particles = [];
        
        const keys = {};
        const mouse = { x: canvas.width/2, y: canvas.height/2, down: false };
        let buildMode = null;
        let shopOpen = false;

        // --- OYUN BASLATMA ---
        function init() {
            // Dev kaynaklar (Az sayida ama saglam)
            for(let i=0; i<40; i++) spawnObj('tree');
            for(let i=0; i<30; i++) spawnObj('rock');
            for(let i=0; i<50; i++) spawnObj('bush'); // Elma calilari
            
            // Moblar
            for(let i=0; i<5; i++) spawnEnemy('wolf');
            for(let i=0; i<5; i++) spawnEnemy('bull');
            for(let i=0; i<5; i++) spawnEnemy('duck');
            
            renderShop();
        }

        function spawnObj(type) {
            let x, y, valid=false;
            while(!valid) {
                x = rand(-mapSize/2, mapSize/2);
                y = rand(-mapSize/2, mapSize/2);
                valid = true;
                if(getDist(x,y,player.x,player.y) < 300) valid=false;
                for(let o of objects) if(getDist(x,y,o.x,o.y) < 100) valid=false;
            }
            
            // ZOR KIRILAN KAYNAKLAR
            let hp = type==='tree'?1500 : (type==='rock'?2500 : 200); // 1500 HP agac!
            let r = type==='tree'?rand(60,90) : (type==='rock'?rand(50,70) : 30);
            
            objects.push({ x, y, type, radius:r, health:hp, maxHealth:hp });
        }

        function spawnEnemy(type) {
            let x, y, d;
            do {
                x = rand(-mapSize/2, mapSize/2);
                y = rand(-mapSize/2, mapSize/2);
                d = getDist(x,y,player.x,player.y);
            } while(d < 1000);

            let stats = {};
            if(type === 'wolf') stats = { hp: 300, spd: 4.5, dmg: 10, r: 25, gold: 1000, col: '#7f8c8d' };
            if(type === 'bull') stats = { hp: 800, spd: 2.5, dmg: 25, r: 35, gold: 2000, col: '#5d4037' };
            if(type === 'boss') stats = { hp: 2500, spd: 2.0, dmg: 40, r: 60, gold: 5000, col: '#3e2723' };
            if(type === 'duck') stats = { hp: 150, spd: 5.0, dmg: 0, r: 20, gold: 3000, col: '#f1c40f' }; // Kacar

            enemies.push({
                x, y, type,
                health: stats.hp, maxHealth: stats.hp,
                speed: stats.spd, damage: stats.dmg,
                radius: stats.r, gold: stats.gold, color: stats.col,
                angle: 0, state: 'IDLE', wanderT: {x, y}
            });
        }

        // --- UPDATE ---
        function update() {
            if(player.health <= 0) return;
            if(shopOpen) return; // Shop acikken oyun durur (istege bagli)

            // Hat Etkileri (Speed)
            let spd = player.baseSpeed;
            if(player.hat && hats.find(h=>h.id===player.hat).type === 'speed') spd *= 1.5;
            if(player.hat && hats.find(h=>h.id===player.hat).type === 'god') spd *= 2;
            player.speed = spd;

            // Regen Hat
            if(player.hat && (hats.find(h=>h.id===player.hat).type === 'regen' || hats.find(h=>h.id===player.hat).type === 'god')) {
                player.health = Math.min(player.maxHealth, player.health + 0.05);
            }

            // Hareket
            let mx=0, my=0;
            if(keys['w']||keys['ArrowUp']) my-=1;
            if(keys['s']||keys['ArrowDown']) my+=1;
            if(keys['a']||keys['ArrowLeft']) mx-=1;
            if(keys['d']||keys['ArrowRight']) mx+=1;
            
            // Normalize speed
            if(mx!==0 || my!==0) {
                let mag = Math.sqrt(mx*mx + my*my);
                player.x += (mx/mag) * player.speed;
                player.y += (my/mag) * player.speed;
            }

            // Sinirlar & Carpismalar
            player.x = Math.max(-mapSize/2, Math.min(mapSize/2, player.x));
            player.y = Math.max(-mapSize/2, Math.min(mapSize/2, player.y));
            checkCollisions(player);

            // Kamera
            cam.x = player.x - canvas.width/2;
            cam.y = player.y - canvas.height/2;

            // Fare Acisi
            const scX = canvas.width/2;
            const scY = canvas.height/2;
            player.angle = Math.atan2(mouse.y - scY, mouse.x - scX);

            // ISLEM (Saldiri / Yeme / Insaat)
            if(mouse.down) {
                if(buildMode) {
                    placeBuild();
                    mouse.down = false;
                } 
                else if(player.activeSlot === 0) { // Silah
                    player.attacking = true;
                }
                else if(player.activeSlot === 1) { // Yemek (Elma)
                    eatFood();
                }
            } else {
                player.attacking = false;
            }

            // Silah Animasyon
            if(player.attacking) {
                player.weaponAngle += 0.4;
                if(player.weaponAngle > Math.PI) player.weaponAngle = 0;
                // Vurus zamani
                if(player.weaponAngle > 1.2 && player.weaponAngle < 1.6) checkHit();
            } else {
                player.weaponAngle = 0;
            }

            // Cooldowns
            if(player.eatCooldown > 0) player.eatCooldown--;

            // Mobs
            updateEnemies();
            
            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                particles[i].life--;
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                if(particles[i].life <= 0) particles.splice(i,1);
            }

            // UI
            document.getElementById('wood-val').innerText = player.wood;
            document.getElementById('stone-val').innerText = player.stone;
            document.getElementById('food-val').innerText = player.food;
            document.getElementById('gold-val').innerText = player.gold;
        }

        function eatFood() {
            if(player.eatCooldown > 0) return;
            if(player.food >= 1) {
                player.food--;
                let heal = 20;
                // Medic sapkasi
                if(player.hat && hats.find(h=>h.id===player.hat).type === 'heal') heal *= 2;
                player.health = Math.min(player.maxHealth, player.health + heal);
                spawnParticles(player.x, player.y, '#2ecc71', 5);
                player.eatCooldown = 20; // Hizli yeme engeli
            } else {
                notify("Elma Yok!");
            }
        }

        function checkHit() {
            // Silah Ucu
            let tipX = player.x + Math.cos(player.angle)*60;
            let tipY = player.y + Math.sin(player.angle)*60;

            // Hasar Carpani
            let dmgMult = 1;
            if(player.hat && hats.find(h=>h.id===player.hat).type === 'dmg') dmgMult = 1.3;
            if(player.hat && hats.find(h=>h.id===player.hat).type === 'god') dmgMult = 2;
            let dmg = 25 * dmgMult;

            // Objeler
            for(let i=objects.length-1; i>=0; i--) {
                let o = objects[i];
                if(getDist(tipX, tipY, o.x, o.y) < o.radius + 30) {
                    o.health -= dmg;
                    spawnParticles(o.x, o.y, '#fff', 2);
                    // Titret
                    o.x += Math.cos(player.angle)*3; o.y += Math.sin(player.angle)*3;

                    if(o.health <= 0) {
                        // Bonuslar
                        let dropMult = 1;
                        if(o.type==='tree' && player.hat && hats.find(h=>h.id===player.hat).type==='wood') dropMult=2;
                        if(o.type==='rock' && player.hat && hats.find(h=>h.id===player.hat).type==='stone') dropMult=2;
                        
                        if(o.type==='tree') player.wood += 20 * dropMult;
                        if(o.type==='rock') player.stone += 15 * dropMult;
                        if(o.type==='bush') player.food += 3 * dropMult; // Elma

                        objects.splice(i,1);
                        setTimeout(() => spawnObj(o.type), 10000); // 10 sn sonra dog
                    }
                    return;
                }
            }

            // Binalar (Kendi binani kirma)
            for(let i=buildings.length-1; i>=0; i--) {
                let b = buildings[i];
                if(getDist(tipX, tipY, b.x, b.y) < b.radius + 30) {
                    b.health -= dmg;
                    spawnParticles(b.x, b.y, '#555', 2);
                    if(b.health <= 0) buildings.splice(i,1);
                    return;
                }
            }

            // Moblar
            for(let i=enemies.length-1; i>=0; i--) {
                let e = enemies[i];
                if(getDist(tipX, tipY, e.x, e.y) < e.radius + 30) {
                    e.health -= dmg;
                    spawnParticles(e.x, e.y, 'red', 5);
                    // Geri Tepme
                    e.x += Math.cos(player.angle)*40;
                    e.y += Math.sin(player.angle)*40;

                    if(e.health <= 0) {
                        let g = e.gold;
                        if(player.hat && hats.find(h=>h.id===player.hat).type==='gold') g *= 1.5;
                        player.gold += g;
                        notify("+" + g + " GOLD");
                        
                        // BOSS CIKMA SANS
                        if(e.type==='bull' && Math.random()<0.3) spawnEnemy('boss');
                        
                        enemies.splice(i,1);
                        setTimeout(() => spawnEnemy(e.type), 5000);
                    }
                    return;
                }
            }
        }

        function updateEnemies() {
            enemies.forEach(e => {
                let d = getDist(player.x, player.y, e.x, e.y);
                
                // ORDEK KACAR
                if(e.type === 'duck') {
                    if(d < 400) { // Yaklasirsan kacar
                        e.angle = Math.atan2(e.y - player.y, e.x - player.x); // Ters aci
                        e.x += Math.cos(e.angle) * e.speed;
                        e.y += Math.sin(e.angle) * e.speed;
                    } else {
                         // Idle
                         e.x += (Math.random()-0.5)*2; e.y += (Math.random()-0.5)*2;
                    }
                } 
                // DIGERLERI SALDIRIR
                else {
                    if(d < 600) e.state = 'CHASE';
                    else e.state = 'IDLE';

                    if(e.state === 'CHASE') {
                        e.angle = Math.atan2(player.y - e.y, player.x - e.x);
                        e.x += Math.cos(e.angle) * e.speed;
                        e.y += Math.sin(e.angle) * e.speed;

                        if(d < e.radius + player.radius + 5) {
                            // Oyuncuya vur
                            let dmg = e.damage;
                            // Defans Hat
                            if(player.hat && hats.find(h=>h.id===player.hat).type==='def') dmg *= 0.8;
                            player.health -= dmg;
                            spawnParticles(player.x, player.y, 'red', 2);
                            
                            // Thorns (Diken) Hat
                            if(player.hat && hats.find(h=>h.id===player.hat).type==='thorns') {
                                e.health -= 5;
                            }
                            
                            if(player.health <= 0) location.reload();
                        }
                    } else {
                        // Gezinme
                        if(Math.random()<0.02) e.angle = Math.random()*Math.PI*2;
                        e.x += Math.cos(e.angle)*1; e.y += Math.sin(e.angle)*1;
                    }
                }
                checkCollisions(e); // Moblar da agacin icinden gecemez
            });
        }

        // --- RENDER ---
        function draw() {
            ctx.fillStyle = '#b6db66'; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            // Grid
            ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth=2; ctx.beginPath();
            let gx=Math.floor(cam.x/100)*100, gy=Math.floor(cam.y/100)*100;
            for(let x=gx; x<gx+canvas.width+100; x+=100) { ctx.moveTo(x-cam.x,0); ctx.lineTo(x-cam.x,canvas.height); }
            for(let y=gy; y<gy+canvas.height+100; y+=100) { ctx.moveTo(0,y-cam.y); ctx.lineTo(canvas.width,y-cam.y); }
            ctx.stroke();

            // Cisimler
            objects.forEach(o => {
                if(!inView(o)) return;
                
                if(o.type === 'tree') {
                    // Yaprak katmanlari
                    drawCircle(o.x, o.y, o.radius, '#2ecc71');
                    drawCircle(o.x, o.y, o.radius*0.7, '#27ae60', false);
                } else if(o.type === 'rock') {
                    drawCircle(o.x, o.y, o.radius, '#95a5a6');
                    drawCircle(o.x+5, o.y-5, o.radius*0.4, '#7f8c8d', false);
                } else { // Bush
                    drawCircle(o.x, o.y, o.radius, '#27ae60');
                    // Elmalar
                    drawCircle(o.x-5, o.y-5, 5, 'red', false);
                    drawCircle(o.x+8, o.y+2, 5, 'red', false);
                }
                
                // Can bari (sadece hasar alinca)
                if(o.health < o.maxHealth) {
                   ctx.fillStyle = 'rgba(0,0,0,0.5)';
                   ctx.fillRect(o.x-cam.x-20, o.y-cam.y-o.radius-10, 40, 5);
                   ctx.fillStyle = '#0f0';
                   ctx.fillRect(o.x-cam.x-20, o.y-cam.y-o.radius-10, 40*(o.health/o.maxHealth), 5);
                }
            });

            // Binalar
            buildings.forEach(b => {
                if(b.type==='wall') {
                    ctx.fillStyle='#555'; ctx.fillRect(b.x-20-cam.x, b.y-20-cam.y, 40,40);
                    ctx.strokeStyle='#222'; ctx.strokeRect(b.x-20-cam.x, b.y-20-cam.y, 40,40);
                    // X
                    ctx.beginPath(); ctx.moveTo(b.x-20-cam.x, b.y-20-cam.y); ctx.lineTo(b.x+20-cam.x, b.y+20-cam.y); ctx.stroke();
                } else if(b.type==='spike') {
                    ctx.fillStyle='#7f8c8d'; ctx.beginPath();
                    for(let i=0;i<4;i++) ctx.lineTo(b.x-cam.x+Math.cos(i*1.57)*30, b.y-cam.y+Math.sin(i*1.57)*30);
                    ctx.fill(); ctx.stroke();
                } else {
                    drawCircle(b.x, b.y, 25, 'brown');
                    drawCircle(b.x, b.y, 10, '#000');
                }
            });

            // Moblar
            enemies.forEach(e => {
                if(!inView(e)) return;
                ctx.save(); ctx.translate(e.x-cam.x, e.y-cam.y); ctx.rotate(e.angle);
                
                // Kulaklar/Boynuzlar
                if(e.type==='wolf') {
                    ctx.fillStyle=e.color;
                    ctx.beginPath(); ctx.moveTo(10,-20); ctx.lineTo(25,-30); ctx.lineTo(20,-10); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(10,20); ctx.lineTo(25,30); ctx.lineTo(20,10); ctx.fill(); ctx.stroke();
                } else if(e.type==='bull' || e.type==='boss') {
                    ctx.fillStyle='#fff';
                    ctx.beginPath(); ctx.moveTo(10,-10); ctx.lineTo(35,-25); ctx.lineTo(15,-5); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(10,10); ctx.lineTo(35,25); ctx.lineTo(15,5); ctx.fill(); ctx.stroke();
                }

                // Govde
                ctx.fillStyle = e.color;
                ctx.beginPath(); ctx.arc(0,0,e.radius,0,6.28); ctx.fill();
                ctx.lineWidth=3; ctx.strokeStyle='#222'; ctx.stroke();

                // Gaga (Ordek)
                if(e.type==='duck') {
                    ctx.fillStyle='orange';
                    ctx.beginPath(); ctx.arc(15, 0, 10, 0, 6.28); ctx.fill(); ctx.stroke();
                }

                ctx.restore();
            });

            // OYUNCU
            ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(player.angle);
            
            // Silah veya Yemek
            ctx.save();
            if(player.activeSlot === 0) { // Balta
                ctx.translate(20, 20); ctx.rotate(player.weaponAngle);
                ctx.fillStyle='#8e44ad'; ctx.fillRect(0,-4,50,8);
                ctx.fillStyle='gold'; ctx.beginPath(); ctx.arc(50,0,15,0,6.28); ctx.fill();
            } else { // Elma
                ctx.translate(25, 15);
                if(player.attacking) ctx.translate(5,0); // Yeme hareketi
                ctx.fillStyle='red'; ctx.beginPath(); ctx.arc(0,0,10,0,6.28); ctx.fill();
            }
            ctx.restore();
            
            // El
            ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(20,-20,10,0,6.28); ctx.fill(); // Sol
            ctx.beginPath(); ctx.arc(20,20,10,0,6.28); ctx.fill(); // Sag

            // Kafa
            ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,25,0,6.28); ctx.fill();
            ctx.stroke();

            // SAPKA CIZIMI
            if(player.hat) {
                let h = hats.find(x=>x.id===player.hat);
                ctx.fillStyle = h.color;
                
                if(h.type==='speed') { // Kulaklik gibi
                    ctx.fillRect(-10, -30, 20, 10); ctx.fillRect(-30, -10, 10, 20); ctx.fillRect(20, -10, 10, 20);
                } 
                else if(h.type==='thorns') { // Dikenli
                    ctx.beginPath(); for(let i=0;i<6;i++) ctx.lineTo(Math.cos(i)*35, Math.sin(i)*35); ctx.fill();
                }
                else if(h.type==='god') { // Tac
                    ctx.fillStyle='gold';
                    ctx.beginPath(); ctx.moveTo(-20,-20); ctx.lineTo(-10,-35); ctx.lineTo(0,-20); ctx.lineTo(10,-35); ctx.lineTo(20,-20); ctx.lineTo(20,10); ctx.lineTo(-20,10); ctx.fill();
                    ctx.strokeStyle='orange'; ctx.stroke();
                }
                else { // Normal Sapka
                    ctx.beginPath(); ctx.arc(0,0,25,0,6.28); ctx.fill();
                    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(0,0,15,0,6.28); ctx.fill();
                }
            }
            ctx.restore();

            // Particles
            particles.forEach(p => drawCircle(p.x, p.y, p.radius, p.color, false));

            // Can Bari
            ctx.fillStyle='#333'; ctx.fillRect(canvas.width/2-30, canvas.height/2+40, 60, 8);
            ctx.fillStyle='#2ecc71'; ctx.fillRect(canvas.width/2-30, canvas.height/2+40, 60*(player.health/player.maxHealth), 8);
        }

        // --- YARDIMCILAR ---
        function drawCircle(x,y,r,c,s=true) {
            if(x-cam.x<-50 || x-cam.x>canvas.width+50) return;
            ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x-cam.x, y-cam.y, r, 0, 6.28); ctx.fill();
            if(s){ ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=3; ctx.stroke(); }
        }
        function checkCollisions(ent) {
            objects.forEach(o => {
                if(o.type==='bush') return;
                let d = getDist(ent.x, ent.y, o.x, o.y);
                if(d < ent.radius + o.radius) {
                    let a = Math.atan2(ent.y-o.y, ent.x-o.x);
                    let p = (ent.radius+o.radius) - d;
                    ent.x += Math.cos(a)*p; ent.y += Math.sin(a)*p;
                }
            });
            buildings.forEach(b => {
                 if(b.type==='trap') return;
                 let d = getDist(ent.x, ent.y, b.x, b.y);
                 if(d < ent.radius + b.radius) {
                    let a = Math.atan2(ent.y-b.y, ent.x-b.x);
                    let p = (ent.radius+b.radius) - d;
                    ent.x += Math.cos(a)*p; ent.y += Math.sin(a)*p;
                    if(b.type==='spike' && ent!==player) ent.health-=0.5;
                 }
            });
        }
        function placeBuild() {
            let costW=0, costS=0;
            if(buildMode==='wall') costW=10;
            if(buildMode==='spike') costS=15;
            if(buildMode==='trap') costW=30;

            if(player.wood>=costW && player.stone>=costS) {
                player.wood-=costW; player.stone-=costS;
                let bx = player.x + Math.cos(player.angle)*60;
                let by = player.y + Math.sin(player.angle)*60;
                buildings.push({x:bx, y:by, type:buildMode, health:200, radius:30});
                selectBuild(null);
            } else notify("Yetersiz Kaynak");
        }
        function selectBuild(t) { buildMode=t; document.querySelectorAll('.build-item').forEach(e=>e.classList.remove('selected')); if(t)document.getElementById('btn-'+t).classList.add('selected'); }
        function selectSlot(s) { player.activeSlot=s; document.querySelectorAll('.inv-slot').forEach(e=>e.classList.remove('active')); document.getElementById('slot-'+s).classList.add('active'); }
        function toggleShop() {
            shopOpen = !shopOpen;
            document.getElementById('shop-modal').style.display = shopOpen ? 'flex' : 'none';
        }
        function renderShop() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = '';
            hats.forEach(h => {
                let div = document.createElement('div');
                div.className = 'shop-item';
                if(player.hat === h.id) div.classList.add('equipped');
                div.innerHTML = `
                    <div class="hat-preview" style="background:${h.color}"></div>
                    <div style="font-weight:bold">${h.name}</div>
                    <div style="font-size:10px; color:#aaa; margin:5px 0;">${h.desc}</div>
                    <div style="color:gold; font-weight:bold;">${h.price} G</div>
                    <button onclick="buyHat(${h.id})" style="margin-top:5px; cursor:pointer;">${player.hat===h.id ? 'TAKILI' : 'AL / TAK'}</button>
                `;
                grid.appendChild(div);
            });
        }
        window.buyHat = function(id) {
            let h = hats.find(x=>x.id===id);
            if(player.hat === id) { // Cikar
                player.hat = null;
            } else {
                if(player.gold >= h.price) { // Al
                    player.hat = id;
                    // Not: Bu basit versiyonda satin alinanlari kaydetmiyoruz, direkt takiyoruz.
                    // Para dusmuyoruz ki degistirebilsin. Istersen burayi degistiririz.
                } else notify("Yetersiz Altın!");
            }
            renderShop();
        }
        function notify(msg) { let n=document.getElementById('notify'); n.innerText=msg; n.style.opacity=1; setTimeout(()=>n.style.opacity=0,1500); }
        function spawnParticles(x,y,c,n) { for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,life:20,color:c,radius:3}); }
        function rand(min,max){return Math.random()*(max-min)+min;}
        function getDist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1);}
        function inView(o){return o.x-cam.x>-100 && o.x-cam.x<canvas.width+100 && o.y-cam.y>-100 && o.y-cam.y<canvas.height+100;}
        function loop(){ update(); draw(); requestAnimationFrame(loop); }

        window.addEventListener('keydown', e=>{
            keys[e.key]=true;
            if(e.key==='1') selectSlot(0);
            if(e.key==='2') selectSlot(1);
        });
        window.addEventListener('keyup', e=>keys[e.key]=false);
        window.addEventListener('mousemove', e=>{mouse.x=e.clientX; mouse.y=e.clientY;});
        window.addEventListener('mousedown', ()=>mouse.down=true);
        window.addEventListener('mouseup', ()=>mouse.down=false);
        window.addEventListener('resize', ()=>{canvas.width=innerWidth; canvas.height=innerHeight;});

        init();
        loop();
    </script>
</body>
</html>
