<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reis Portal - Akıllı Asistan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        /* TV'de Kumanda ile Odaklanma Efekti */
        .nav-btn:focus { transform: scale(1.1); border: 4px solid #ff6600; background-color: #1e293b; outline: none; }
        .nav-btn { transition: all 0.3s; border: 2px solid transparent; }
        
        /* Iframe Alanı */
        #content-frame { width: 100%; height: calc(100vh - 80px); border: none; display: none; }
        
        /* Turuncu Çöp Adam */
        #stickman-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; cursor: pointer; }
        #stickman-img { width: 120px; height: auto; transition: transform 0.3s; }
        #stickman-img:hover { transform: translateY(-10px) rotate(5deg); }
        
        /* Sohbet Baloncuğu */
        .bubble { 
            position: absolute; bottom: 130px; right: 20px; background: white; color: #333;
            padding: 15px; border-radius: 20px; min-width: 150px; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-weight: bold;
        }

        /* Sohbet Menüsü (Modal) */
        #chat-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; background: #1e293b; border: 3px solid #ff6600;
            border-radius: 20px; padding: 20px; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <nav id="top-nav" class="h-20 flex items-center justify-around bg-slate-800 px-5">
        <button class="nav-btn p-3 px-6 rounded-lg bg-slate-700 font-bold" onclick="openSite('https://www.google.com/search?q=film+izle')">Filmler</button>
        <button class="nav-btn p-3 px-6 rounded-lg bg-slate-700 font-bold" onclick="openSite('https://www.youtube.com')">YouTube</button>
        <button class="nav-btn p-3 px-6 rounded-lg bg-slate-700 font-bold" onclick="openSite('https://www.asurascans.com')">Mangalar</button>
        <button class="nav-btn p-3 px-6 rounded-lg bg-red-600 font-bold" onclick="location.reload()">🏠 ANA SAYFA</button>
    </nav>

    <div id="main-ui" class="flex flex-col items-center justify-center h-[80vh]">
        <h1 class="text-4xl font-extrabold text-orange-500 mb-8">HOŞ GELDİN REİS</h1>
        <p class="text-slate-400 mb-10 text-center">Televizyondan kumanda ile seçebilir veya Stickman'e tıklayabilirsin.</p>
        
        <div class="grid grid-cols-2 gap-6">
            <div class="nav-btn p-10 bg-slate-800 rounded-2xl text-center cursor-pointer" tabindex="1" onclick="openSite('https://www.google.com')">
                <span class="text-5xl">🔍</span><br><b class="mt-4 block">Arama Yap</b>
            </div>
            <div class="nav-btn p-10 bg-slate-800 rounded-2xl text-center cursor-pointer" tabindex="2" onclick="toggleChat()">
                <span class="text-5xl">💬</span><br><b class="mt-4 block">Yapay Zekaya Sor</b>
            </div>
        </div>
    </div>

    <iframe id="content-frame"></iframe>

    <div id="stickman-container" onclick="toggleChat()">
        <div id="bubble" class="bubble">Selam reis! Bugün ne izliyoruz?</div>
        <img id="stickman-img" src="orange_stickman.png" alt="Alan Becker Stickman">
    </div>

    <div id="chat-menu">
        <h2 class="text-xl font-bold text-orange-500 mb-4 border-b border-orange-500 pb-2">Reis Sohbet</h2>
        <div id="chat-history" class="h-64 overflow-y-auto mb-4 space-y-2 text-sm">
            <p class="text-slate-400 italic">Geçmiş mesajların burada görünecek...</p>
        </div>
        <div class="flex gap-2">
            <input id="ai-input" type="text" placeholder="Bir şey yaz..." class="flex-1 p-2 rounded bg-slate-900 border border-slate-700">
            <button onclick="askAI()" class="bg-orange-600 px-4 py-2 rounded font-bold">Sor</button>
        </div>
        <button class="mt-4 text-xs text-slate-500 underline" onclick="toggleChat()">Kapat</button>
    </div>

    <script>
        // Siteyi Iframe içinde açar
        function openSite(url) {
            document.getElementById('main-ui').style.display = 'none';
            const frame = document.getElementById('content-frame');
            frame.src = url;
            frame.style.display = 'block';
            
            showBubble("Hemen açıyorum reis!");
        }

        // Sohbet Menüsünü Aç/Kapat
        function toggleChat() {
            const menu = document.getElementById('chat-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
            if(menu.style.display === 'block') document.getElementById('ai-input').focus();
        }

        // Yapay Zekaya Soru Sor
        async function askAI() {
            const input = document.getElementById('ai-input');
            const history = document.getElementById('chat-history');
            if(!input.value) return;

            // Kullanıcı mesajını ekle
            history.innerHTML += `<div class="bg-slate-700 p-2 rounded text-right"><b>Sen:</b> ${input.value}</div>`;
            
            const userText = input.value;
            input.value = "";

            // --- BURADA GROQ VEYA DİĞER API'YE BAĞLANILACAK ---
            // Şimdilik simülasyon yapalım:
            setTimeout(() => {
                let response = "Anladım reis, senin için araştırıyorum.";
                if(userText.includes("film")) response = "Bugün 'Inception' filmini izlemeye ne dersin?";
                
                history.innerHTML += `<div class="bg-orange-900 p-2 rounded text-left"><b>AI:</b> ${response}</div>`;
                history.scrollTop = history.scrollHeight;
                showBubble(response);
            }, 1000);
        }

        // Baloncuğu Göster
        function showBubble(text) {
            const b = document.getElementById('bubble');
            b.innerText = text;
            b.style.display = 'block';
            setTimeout(() => b.style.display = 'none', 4000);
        }

        // TV Kumandası için Tuş Desteği
        document.addEventListener('keydown', (e) => {
            // Esc tuşu ile ana sayfaya dön
            if(e.key === 'Escape') location.reload();
        });
    </script>
</body>
</html>
