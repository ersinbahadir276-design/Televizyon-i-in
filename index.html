<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIN BOT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        body { background: #000; height: 100vh; font-family: monospace; }

        #game-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Durum Gostergesi */
        #status-box {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            background: rgba(0, 0, 0, 0.7); border: 2px solid #555;
            color: #fff; padding: 15px; border-radius: 10px;
            pointer-events: none; /* Tiklamayi engelle */
            transition: 0.2s;
        }
        
        #status-box.active {
            border-color: #0f0;
            box-shadow: 0 0 15px #0f0;
        }

        h1 { font-size: 18px; margin-bottom: 5px; }
        p { font-size: 12px; color: #aaa; }
        
        .state { font-weight: bold; color: red; font-size: 20px; }
        .active .state { color: #0f0; }

    </style>
</head>
<body>

    <div id="game-container">
        <iframe id="game" src="https://moomoo.io" allowfullscreen></iframe>
    </div>

    <div id="status-box">
        <h1>🌪️ SPIN BOT</h1>
        <div class="state" id="mode-text">KAPALI</div>
        <p>Açmak/Kapatmak için <b>'0'</b> tuşuna bas.</p>
    </div>

    <script>
        const frame = document.getElementById('game');
        const box = document.getElementById('status-box');
        const txt = document.getElementById('mode-text');

        let isSpinning = false;
        let spinInterval;
        let angle = 0;
        const radius = 300; // Dairenin genisligi
        const speed = 0.8;  // Donme hizi (Ne kadar yuksek o kadar hizli)

        // Spin Botunu Ac/Kapat
        function toggleSpin() {
            if (isSpinning) {
                // Kapat
                clearInterval(spinInterval);
                isSpinning = false;
                box.classList.remove('active');
                txt.textContent = "KAPALI";
                txt.style.color = "red";
            } else {
                // Ac
                isSpinning = true;
                box.classList.add('active');
                txt.textContent = "AÇIK (DÖNÜYOR)";
                txt.style.color = "#0f0";
                
                // Oyuna odaklan ki komutlar gitsin
                frame.focus();

                // Hizli Dongu
                spinInterval = setInterval(() => {
                    spinLogic();
                }, 16); // 60 FPS (Yaklasik 16ms)
            }
        }

        function spinLogic() {
            // Matematiksel Daire Hesabi
            angle += speed;
            
            // Ekranin ortasini bul
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // Yeni mouse pozisyonunu hesapla
            const x = centerX + Math.cos(angle) * radius;
            const y = centerY + Math.sin(angle) * radius;

            // Sanal Mouse Hareketi Olustur
            // Bu olay tarayiciya "Mouse suraya gitti" der.
            const moveEvent = new MouseEvent('mousemove', {
                view: window,
                bubbles: true,
                cancelable: true,
                clientX: x,
                clientY: y,
                screenX: x, // Bazi tarayicilar bunu ister
                screenY: y
            });

            // Olayi iframe'e gonder
            frame.dispatchEvent(moveEvent);
            
            // Bazi durumlarda document'e gondermek de ise yarar
            document.dispatchEvent(moveEvent);
        }

        // Klavye Dinleyicisi ('0' Tusu)
        window.addEventListener('keydown', (e) => {
            if (e.key === '0') {
                toggleSpin();
            }
        });

        // Bazen TV kumandasinda '0' tusu farkli kod gonderebilir, onu da yakalayalim
        window.addEventListener('keypress', (e) => {
            if (e.key === '0' || e.code === 'Digit0') {
                toggleSpin();
            }
        });

    </script>
</body>
</html>
