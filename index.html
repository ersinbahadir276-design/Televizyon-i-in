<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moo-TV ULTRA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; user-select: none; }
        body { background: #b6db66; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }

        /* UI KATMANI */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* KAYNAKLAR */
        .res-bar {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px;
            display: flex; gap: 15px; color: white; font-weight: bold; font-size: 20px;
            text-shadow: 1px 1px 2px black; pointer-events: auto;
        }
        .icon { width: 30px; height: 30px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.3); display:inline-block; vertical-align:middle; }

        /* INSAAT MENU */
        #build-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; pointer-events: auto;
        }
        .build-item {
            width: 70px; height: 70px; background: rgba(0,0,0,0.5); border: 3px solid #555;
            border-radius: 10px; cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .build-item:hover { transform: scale(1.1); background: rgba(0,0,0,0.7); }
        .build-item.selected { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; transform: translateY(-10px); }
        .cost { position: absolute; bottom: 2px; right: 5px; font-size: 12px; color: #fff; font-weight: bold; }

        /* MINI HARITA */
        #minimap-container {
            position: absolute; bottom: 20px; right: 20px;
            width: 150px; height: 150px; background: rgba(0,0,0,0.3);
            border: 2px solid #fff; border-radius: 50%; overflow: hidden;
        }

        /* BILDIRIM */
        .notification {
            position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
            background: rgba(231, 76, 60, 0.9); color: white; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; font-size: 18px;
            opacity: 0; transition: opacity 0.5s; pointer-events: none;
        }

        /* OLUM EKRANI */
        #death-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; pointer-events: auto;
        }
        .death-btn {
            background: #27ae60; color: white; border: none; padding: 20px 50px;
            font-size: 24px; border-radius: 10px; cursor: pointer; margin-top: 20px;
            border-bottom: 5px solid #1e8449;
        }
        .death-btn:active { transform: translateY(5px); border-bottom: none; }

    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="res-bar">
            <div><div class="icon" style="background:#a56d38"></div> <span id="wood-val">0</span></div>
            <div><div class="icon" style="background:#7f8c8d"></div> <span id="stone-val">0</span></div>
            <div><div class="icon" style="background:#e74c3c"></div> <span id="food-val">0</span></div>
            <div>🏆 <span id="score-val">0</span></div>
        </div>

        <div id="build-bar">
            <div class="build-item" onclick="selectBuild('wall')" id="btn-wall">
                <div style="width:30px; height:30px; background:#555; border:2px solid #333;"></div>
                <span class="cost">10W</span>
            </div>
            <div class="build-item" onclick="selectBuild('spike')" id="btn-spike">
                <div style="width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent; border-bottom:30px solid #777;"></div>
                <span class="cost">15S</span>
            </div>
            <div class="build-item" onclick="selectBuild('trap')" id="btn-trap">
                <div style="width:30px; height:30px; border:3px solid #a56d38; border-radius:50%;"></div>
                <span class="cost">30W</span>
            </div>
            <div class="build-item" onclick="selectBuild(null)" style="background:#c0392b">
                <span style="color:white; font-weight:bold;">İPTAL</span>
            </div>
        </div>

        <div id="minimap-container"><canvas id="minimap"></canvas></div>
        <div id="notify" class="notification">Yetersiz Kaynak!</div>
    </div>

    <div id="death-screen">
        <h1 style="color:white; font-size:50px; text-shadow:0 0 20px red;">ÖLDÜN REİS!</h1>
        <p style="color:#ddd; font-size:24px; margin-top:10px;">Skorun: <span id="final-score">0</span></p>
        <button class="death-btn" onclick="location.reload()">TEKRAR DOĞ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const miniCanvas = document.getElementById('minimap');
        const miniCtx = miniCanvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        miniCanvas.width = 150; miniCanvas.height = 150;

        // AYARLAR
        const mapSize = 3000;
        const player = {
            x: 0, y: 0, angle: 0, radius: 25, speed: 5,
            health: 100, maxHealth: 100,
            wood: 0, stone: 0, food: 0, score: 0,
            attacking: false, weaponAngle: 0
        };
        const cam = { x: 0, y: 0 };
        
        let objects = [];
        let enemies = [];
        let buildings = [];
        let particles = [];
        
        const keys = {};
        const mouse = { x: canvas.width/2, y: canvas.height/2, down: false };
        let buildMode = null;

        // --- HARITA OLUSTUR ---
        function initWorld() {
            for(let i=0; i<80; i++) spawnObj('tree');
            for(let i=0; i<50; i++) spawnObj('rock');
            for(let i=0; i<40; i++) spawnObj('bush');
            for(let i=0; i<10; i++) spawnEnemy();
        }

        // AKILLI DOGMA SISTEMI (Binalarin ustune dogmaz)
        function spawnObj(type) {
            let valid = false;
            let attempts = 0;
            let x, y, r;

            // Tip ozellikleri
            if(type === 'tree') r = rand(40, 60);
            else if(type === 'rock') r = rand(30, 50);
            else r = 25; // Bush

            // Bos yer bulana kadar dene (Max 50 deneme)
            while(!valid && attempts < 50) {
                x = rand(-mapSize/2, mapSize/2);
                y = rand(-mapSize/2, mapSize/2);
                valid = true;

                // Binalara carpiyor mu?
                for(let b of buildings) {
                    if(Math.hypot(x-b.x, y-b.y) < r + b.radius + 10) {
                        valid = false; break;
                    }
                }
                // Oyuncuya cok yakin dogmasin
                if(Math.hypot(x-player.x, y-player.y) < 200) valid = false;

                attempts++;
            }

            // Eger 50 denemede yer bulamazsa, mecbur rastgele koyariz (nadir durum)
            let hp = type==='tree'?100 : (type==='rock'?150:30);
            let col = type==='tree'?'#2ecc71' : (type==='rock'?'#95a5a6':'#e74c3c');

            objects.push({
                x: x, y: y, radius: r, type: type,
                health: hp, maxHealth: hp, color: col
            });
        }

        function spawnEnemy() {
            // Uzakta dog
            let x, y, d;
            do {
                x = rand(-mapSize/2, mapSize/2);
                y = rand(-mapSize/2, mapSize/2);
                d = Math.hypot(x-player.x, y-player.y);
            } while(d < 800);

            enemies.push({
                x:x, y:y, angle:0, radius:25, speed:2.5,
                health:100, maxHealth:100, state:'IDLE',
                wanderTarget:{x:x, y:y}
            });
        }

        // --- FIZIK MOTORU ---
        // Kati objelerle carpisma kontrolu (Icindenn gecmeyi engeller)
        function resolveEnvironmentCollision(entity) {
            objects.forEach(obj => {
                if(obj.type === 'bush') return; // Calilarin icinden gecilir
                
                const dist = Math.hypot(entity.x - obj.x, entity.y - obj.y);
                const minDist = entity.radius + obj.radius;
                
                if(dist < minDist) {
                    // Itme gucu
                    const angle = Math.atan2(entity.y - obj.y, entity.x - obj.x);
                    const push = minDist - dist;
                    entity.x += Math.cos(angle) * push;
                    entity.y += Math.sin(angle) * push;
                }
            });

            // Binalar da katidir
            buildings.forEach(b => {
                if(b.type === 'trap') return; // Tuzak uzerinden gecilir (yavaslatir belki)
                const dist = Math.hypot(entity.x - b.x, entity.y - b.y);
                const minDist = entity.radius + b.radius;
                
                if(dist < minDist) {
                    const angle = Math.atan2(entity.y - b.y, entity.x - b.x);
                    const push = minDist - dist;
                    entity.x += Math.cos(angle) * push;
                    entity.y += Math.sin(angle) * push;
                    
                    if(b.type === 'spike' && entity !== player) {
                         entity.health -= 0.5; // Diken zombiye hasar verir
                    }
                }
            });
        }

        function update() {
            if(player.health <= 0) return;

            // Hareket
            let mvX = 0, mvY = 0;
            if(keys['ArrowUp'] || keys['w']) mvY -= player.speed;
            if(keys['ArrowDown'] || keys['s']) mvY += player.speed;
            if(keys['ArrowLeft'] || keys['a']) mvX -= player.speed;
            if(keys['ArrowRight'] || keys['d']) mvX += player.speed;

            player.x += mvX; player.y += mvY;

            // Harita Siniri
            player.x = Math.max(-mapSize/2, Math.min(mapSize/2, player.x));
            player.y = Math.max(-mapSize/2, Math.min(mapSize/2, player.y));

            // Kati Cisim Kontrolu
            resolveEnvironmentCollision(player);

            // Kamera
            cam.x = player.x - canvas.width/2;
            cam.y = player.y - canvas.height/2;

            // Mouse Acisi
            player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);

            // Islem (Saldiri / Insaat)
            if(mouse.down) {
                if(buildMode) {
                    placeBuilding();
                    mouse.down = false; 
                } else {
                    player.attacking = true;
                }
            } else {
                player.attacking = false;
            }

            // Animasyon
            if(player.attacking) {
                player.weaponAngle += 0.35;
                if(player.weaponAngle > Math.PI) player.weaponAngle = 0;
                if(player.weaponAngle > 1.2 && player.weaponAngle < 1.6) checkHit();
            } else {
                player.weaponAngle = 0;
            }

            // AI Guncelleme
            updateEnemies();

            // Efektler
            updateParticles();

            // UI
            updateUI();
        }

        function updateEnemies() {
            if(enemies.length < 15 && Math.random() < 0.02) spawnEnemy();

            enemies.forEach((en, i) => {
                // Yapay Zeka
                const dist = Math.hypot(player.x - en.x, player.y - en.y);
                
                if(dist < 500) en.state = 'CHASE';
                else en.state = 'IDLE';

                let angle = en.angle;
                let moveSpeed = 0;

                if(en.state === 'CHASE') {
                    angle = Math.atan2(player.y - en.y, player.x - en.x);
                    moveSpeed = en.speed;
                    // Saldiri
                    if(dist < player.radius + en.radius + 5) {
                        player.health -= 0.3;
                        spawnParticles(player.x, player.y, 'red', 1);
                        if(player.health <= 0) gameOver();
                    }
                } else {
                    // IDLE
                    const dt = Math.hypot(en.wanderTarget.x - en.x, en.wanderTarget.y - en.y);
                    if(dt < 10 || Math.random() < 0.01) {
                        en.wanderTarget.x = en.x + rand(-300, 300);
                        en.wanderTarget.y = en.y + rand(-300, 300);
                    }
                    angle = Math.atan2(en.wanderTarget.y - en.y, en.wanderTarget.x - en.x);
                    moveSpeed = 1;
                }

                en.angle = angle;
                en.x += Math.cos(angle) * moveSpeed;
                en.y += Math.sin(angle) * moveSpeed;

                // Zombi de agacin icinden gecemez
                resolveEnvironmentCollision(en);
            });
        }

        function checkHit() {
            const tx = player.x + Math.cos(player.angle) * 60;
            const ty = player.y + Math.sin(player.angle) * 60;

            // Objeler
            for(let i=objects.length-1; i>=0; i--) {
                let obj = objects[i];
                if(Math.hypot(tx-obj.x, ty-obj.y) < obj.radius + 20) {
                    // Hasar
                    obj.health -= 20; 
                    spawnParticles(obj.x, obj.y, obj.color, 3);
                    // Hafif sarsinti
                    obj.x += Math.cos(player.angle)*2; obj.y += Math.sin(player.angle)*2;

                    if(obj.health <= 0) {
                        if(obj.type === 'tree') player.wood += 15;
                        if(obj.type === 'rock') player.stone += 10;
                        if(obj.type === 'bush') { player.food += 10; player.health=Math.min(100, player.health+10); }
                        player.score += 50;
                        
                        // Eski objeyi sil
                        objects.splice(i, 1);
                        // YENISINI DOGUR (Respawn)
                        setTimeout(() => spawnObj(obj.type), 2000); 
                    }
                    return; // Ayni anda 1 taneye vur
                }
            }

            // Dusmanlar
            for(let i=enemies.length-1; i>=0; i--) {
                let en = enemies[i];
                if(Math.hypot(tx-en.x, ty-en.y) < en.radius + 30) {
                    en.health -= 35;
                    spawnParticles(en.x, en.y, 'red', 5);
                    // Geri tepme
                    en.x += Math.cos(player.angle) * 50;
                    en.y += Math.sin(player.angle) * 50;
                    
                    if(en.health <= 0) {
                        enemies.splice(i, 1);
                        player.score += 200;
                    }
                    return;
                }
            }
        }

        function selectBuild(type) {
            buildMode = type;
            document.querySelectorAll('.build-item').forEach(e => e.classList.remove('selected'));
            if(type) document.getElementById('btn-'+type).classList.add('selected');
        }

        function placeBuilding() {
            let costW = 0, costS = 0;
            if(buildMode === 'wall') costW = 10;
            if(buildMode === 'spike') costS = 15;
            if(buildMode === 'trap') costW = 30;

            if(player.wood >= costW && player.stone >= costS) {
                player.wood -= costW; player.stone -= costS;
                const bx = player.x + Math.cos(player.angle) * 60;
                const by = player.y + Math.sin(player.angle) * 60;
                
                buildings.push({
                    x: bx, y: by, radius: 30, type: buildMode, health: 200
                });
                spawnParticles(bx, by, '#fff', 10);
                selectBuild(null);
            } else {
                const n = document.getElementById('notify');
                n.style.opacity = 1; setTimeout(() => n.style.opacity = 0, 1000);
            }
        }

        function draw() {
            // Zemin
            ctx.fillStyle = '#b6db66'; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            // Grid
            ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 2; ctx.beginPath();
            let gx = Math.floor(cam.x/100)*100, gy = Math.floor(cam.y/100)*100;
            for(let x=gx; x<gx+canvas.width+100; x+=100) { ctx.moveTo(x-cam.x,0); ctx.lineTo(x-cam.x,canvas.height); }
            for(let y=gy; y<gy+canvas.height+100; y+=100) { ctx.moveTo(0,y-cam.y); ctx.lineTo(canvas.width,y-cam.y); }
            ctx.stroke();

            // Harita Siniri
            ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 10;
            ctx.strokeRect(-mapSize/2 - cam.x, -mapSize/2 - cam.y, mapSize, mapSize);

            // Cizim Fonksiyonlari
            function drawCircle(x,y,r,col,stroke=true) {
                if(x-cam.x<-100 || x-cam.x>canvas.width+100 || y-cam.y<-100 || y-cam.y>canvas.height+100) return;
                ctx.fillStyle = col; ctx.beginPath(); ctx.arc(x-cam.x, y-cam.y, r, 0, Math.PI*2); ctx.fill();
                if(stroke){ ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth=3; ctx.stroke(); }
            }

            // Binalar
            buildings.forEach(b => {
                if(b.type==='wall') {
                    ctx.fillStyle='#555'; ctx.fillRect(b.x-20-cam.x, b.y-20-cam.y, 40, 40);
                    ctx.strokeStyle='#333'; ctx.strokeRect(b.x-20-cam.x, b.y-20-cam.y, 40, 40);
                } else if(b.type==='spike') {
                    ctx.fillStyle='#999'; ctx.beginPath();
                    for(let i=0;i<4;i++) ctx.lineTo(b.x-cam.x+Math.cos(i*1.57)*30, b.y-cam.y+Math.sin(i*1.57)*30);
                    ctx.fill(); ctx.stroke();
                } else {
                     drawCircle(b.x, b.y, 25, 'rgba(139,69,19,0.8)');
                     drawCircle(b.x, b.y, 10, '#000', false);
                }
            });

            // Objeler
            objects.forEach(o => {
                drawCircle(o.x, o.y, o.radius, o.color);
                // Can gostergesi (Hasar alinca koyulassin)
                if(o.health < o.maxHealth) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath(); ctx.arc(o.x-cam.x, o.y-cam.y, o.radius*(1-o.health/o.maxHealth), 0, Math.PI*2); ctx.fill();
                }
            });

            // Parcaciklar
            particles.forEach(p => { drawCircle(p.x, p.y, p.radius, p.color, false); });

            // Dusmanlar
            enemies.forEach(en => {
                ctx.save(); ctx.translate(en.x-cam.x, en.y-cam.y); ctx.rotate(en.angle);
                // Eller
                ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(20,15,8,0,6.28); ctx.arc(20,-15,8,0,6.28); ctx.fill();
                // Govde
                ctx.fillStyle=en.color; ctx.beginPath(); ctx.arc(0,0,en.radius,0,6.28); ctx.fill();
                ctx.strokeStyle='#333'; ctx.stroke();
                ctx.restore();
                // Can bari
                ctx.fillStyle='red'; ctx.fillRect(en.x-cam.x-20, en.y-cam.y-40, 40, 5);
                ctx.fillStyle='#0f0'; ctx.fillRect(en.x-cam.x-20, en.y-cam.y-40, 40*(en.health/en.maxHealth), 5);
            });

            // OYUNCU
            if(player.health > 0) {
                ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(player.angle);
                // Silah
                ctx.save(); ctx.translate(20, 20); ctx.rotate(player.weaponAngle);
                ctx.fillStyle='#8e44ad'; ctx.fillRect(0,-4,50,8);
                ctx.fillStyle='#f1c40f'; ctx.beginPath(); ctx.arc(50,0,15,0,6.28); ctx.fill();
                ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(0,0,10,0,6.28); ctx.fill();
                ctx.restore();
                // Sol El
                ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(20,-20,10,0,6.28); ctx.fill();
                // Kafa
                ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,player.radius,0,6.28); ctx.fill();
                ctx.strokeStyle='#333'; ctx.lineWidth=3; ctx.stroke();
                ctx.restore();
                
                // Oyuncu Can
                ctx.fillStyle='#333'; ctx.fillRect(canvas.width/2-30, canvas.height/2+40, 60, 8);
                ctx.fillStyle='#2ecc71'; ctx.fillRect(canvas.width/2-30, canvas.height/2+40, 60*(player.health/player.maxHealth), 8);
            }

            // MiniMap
            miniCtx.fillStyle='#2c3e50'; miniCtx.fillRect(0,0,150,150);
            const sc = 150/mapSize, cx=75, cy=75;
            
            function drawMini(arr, col) {
                miniCtx.fillStyle = col;
                arr.forEach(item => {
                    let dx = (item.x-player.x)*sc, dy = (item.y-player.y)*sc;
                    if(dx*dx+dy*dy < 70*70) {
                        miniCtx.beginPath(); miniCtx.arc(cx+dx, cy+dy, 2, 0, 6.28); miniCtx.fill();
                    }
                });
            }
            drawMini(objects.filter(o=>o.type!=='bush'), '#999'); // Objeler
            drawMini(enemies, 'red'); // Dusmanlar
            drawMini(buildings, 'yellow'); // Binalar
            miniCtx.fillStyle='#fff'; miniCtx.beginPath(); miniCtx.arc(cx,cy,3,0,6.28); miniCtx.fill(); // Oyuncu
        }

        function spawnParticles(x,y,col,c) {
            for(let i=0;i<c;i++) particles.push({x:x, y:y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:20, color:col, radius:rand(2,5)});
        }
        function updateParticles() {
            for(let i=particles.length-1;i>=0;i--) {
                let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--;
                if(p.life<=0) particles.splice(i,1);
            }
        }
        function updateUI() {
            document.getElementById('wood-val').innerText = Math.floor(player.wood);
            document.getElementById('stone-val').innerText = Math.floor(player.stone);
            document.getElementById('food-val').innerText = Math.floor(player.food);
            document.getElementById('score-val').innerText = Math.floor(player.score);
        }
        function gameOver() {
            document.getElementById('final-score').innerText = Math.floor(player.score);
            document.getElementById('death-screen').style.display = 'flex';
        }
        function rand(min, max) { return Math.random()*(max-min)+min; }

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);
        window.addEventListener('mousemove', e => { mouse.x=e.clientX; mouse.y=e.clientY; });
        window.addEventListener('mousedown', () => mouse.down=true);
        window.addEventListener('mouseup', () => mouse.down=false);
        window.addEventListener('resize', () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
        
        // Build Kisayollar
        window.addEventListener('keydown', e => {
            if(e.key==='1') selectBuild('wall');
            if(e.key==='2') selectBuild('spike');
            if(e.key==='3') selectBuild('trap');
            if(e.key==='Escape') selectBuild(null);
        });

        initWorld();
        loop();
    </script>
</body>
</html>
