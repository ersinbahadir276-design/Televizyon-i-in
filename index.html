<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Bot Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        body { background: #000; height: 100vh; font-family: 'Segoe UI', sans-serif; }

        /* Oyun Alani */
        #game-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Spin Bot Butonu (Sag Ust) */
        #spin-btn {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: rgba(255, 0, 0, 0.8); color: white;
            border: 3px solid #ff0000; padding: 15px 30px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 10px #ff0000;
            transition: all 0.3s ease;
        }

        /* Bot Acik Hali (Yesil) */
        #spin-btn.active {
            background: rgba(0, 255, 0, 0.8);
            border-color: #0f0;
            box-shadow: 0 0 20px #0f0;
            animation: pulse 1s infinite; /* Yanip sonme efekti */
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Bilgi Metni */
        .info {
            position: absolute; top: 80px; right: 15px; z-index: 1000;
            font-size: 12px; color: #aaa; text-align: right; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <iframe id="game" src="https://moomoo.io" allowfullscreen></iframe>
    </div>

    <!-- Spin Bot Butonu -->
    <button id="spin-btn" onclick="toggleSpin()">
        SPIN BOT: KAPALI
    </button>
    
    <div class="info">
        Butona basınca karakter döner.<br>
        Tekrar basınca durur.
    </div>

    <script>
        const btn = document.getElementById('spin-btn');
        const frame = document.getElementById('game');
        
        let isSpinning = false;
        let spinTimer;
        let angle = 0;
        const radius = 250; // Donus yari capi
        const speed = 0.5; // Donus hizi

        function toggleSpin() {
            if(isSpinning) {
                // Kapat
                clearInterval(spinTimer);
                isSpinning = false;
                btn.classList.remove('active');
                btn.textContent = "SPIN BOT: KAPALI";
                btn.style.background = "rgba(255,0,0,0.8)";
            } else {
                // Ac
                isSpinning = true;
                btn.classList.add('active');
                btn.textContent = "SPIN BOT: AKTİF";
                btn.style.background = "rgba(0,255,0,0.8)";
                
                // Oyuna odakla (Komut gitsin diye)
                frame.focus();

                // Hizli Dongu (60 FPS)
                spinTimer = setInterval(() => {
                    spinLogic();
                }, 16);
            }
        }

        function spinLogic() {
            // Matematiksel Donus Hesabi
            angle += speed;
            
            // Ekranin ortasi
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            // Yeni koordinat
            const x = cx + Math.cos(angle) * radius;
            const y = cy + Math.sin(angle) * radius;

            // Mouse Event Olustur
            // Bu event tarayiciya "Mouse buraya gitti" der.
            const evt = new MouseEvent('mousemove', {
                view: window,
                bubbles: true,
                cancelable: true,
                clientX: x,
                clientY: y,
                screenX: x,
                screenY: y
            });

            // Eventi iframe'e gonder
            // Not: CORS korumasi yoksa calisir.
            frame.dispatchEvent(evt);
            
            // Ayrica document'e de gonder (Bazi oyunlar document'i dinler)
            document.dispatchEvent(evt);
        }

        // Kumanda ile butona kolay ulasmak icin 'Tab Index' destegi
        // (Tarayici otomatik halleder ama yine de guvenlik onlemi)
        btn.setAttribute('tabindex', '1');

        // Enter tusu ile butonu tetikleme (Odak butondaysa)
        btn.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' || e.key === ' ') {
                toggleSpin();
            }
        });

    </script>
</body>
</html>
