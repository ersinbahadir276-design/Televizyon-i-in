<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reis Portal - Animasyonlu Asistan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        body { background-color: #0f172a; color: white; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* TV'de Kumanda ile Odaklanma Efekti */
        .nav-btn:focus { transform: scale(1.1); border: 4px solid #ff6600; background-color: #1e293b; outline: none; }
        .nav-btn { transition: all 0.3s; border: 2px solid transparent; }
        
        /* Iframe Alanı */
        #content-frame { width: 100%; height: calc(100vh - 80px); border: none; display: none; }
        
        /* Animasyonlu Stickman Konteyner */
        #stickman-container { 
            position: fixed; bottom: -20px; right: -20px; 
            z-index: 1000; cursor: pointer; 
            width: 200px; height: 200px;
            transition: transform 0.3s ease;
        }
        #stickman-container:hover { transform: translateY(-10px); }
        
        /* Sohbet Baloncuğu */
        .bubble { 
            position: absolute; bottom: 180px; right: 50px; background: white; color: #333;
            padding: 15px; border-radius: 20px; min-width: 180px; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-weight: bold; z-index: 1001;
            font-size: 14px;
        }
        .bubble::after { /* Baloncuk oku */
            content: ''; position: absolute; top: 100%; right: 30px;
            border-width: 10px; border-style: solid;
            border-color: white transparent transparent transparent;
        }

        /* Sohbet Menüsü (Modal) */
        #chat-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; max-width: 500px; background: #1e293b; border: 3px solid #ff6600;
            border-radius: 20px; padding: 20px; display: none; z-index: 2000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        #chat-history::-webkit-scrollbar { width: 5px; }
        #chat-history::-webkit-scrollbar-thumb { background: #ff6600; border-radius: 10px; }
    </style>
</head>
<body>

    <nav id="top-nav" class="h-20 flex items-center justify-around bg-slate-800 px-5 border-b-2 border-orange-500">
        <button class="nav-btn p-3 px-6 rounded-lg bg-slate-700 font-bold text-sm" tabindex="1" onclick="openSite('https://www.google.com/search?q=film+izle')">🎬 Filmler</button>
        <button class="nav-btn p-3 px-6 rounded-lg bg-slate-700 font-bold text-sm" tabindex="2" onclick="openSite('https://www.youtube.com')">📺 YouTube</button>
        <button class="nav-btn p-3 px-6 rounded-lg bg-slate-700 font-bold text-sm" tabindex="3" onclick="openSite('https://www.asurascans.com')">📚 Mangalar</button>
        <button class="nav-btn p-3 px-6 rounded-lg bg-red-600 font-bold text-sm" tabindex="4" onclick="location.reload()">🏠 ANA SAYFA</button>
    </nav>

    <div id="main-ui" class="flex flex-col items-center justify-center h-[80vh] p-5">
        <h1 class="text-4xl md:text-5xl font-extrabold text-orange-500 mb-8 text-center">HOŞ GELDİN REİS</h1>
        <p class="text-slate-400 mb-10 text-center max-w-lg text-sm md:text-base">Televizyondan kumanda ile seçebilir veya animasyonlu Stickman'e tıklayıp yapay zeka ile konuşabilirsin.</p>
        
        <div class="grid grid-cols-2 gap-6 w-full max-w-md">
            <div class="nav-btn p-8 bg-slate-800 rounded-2xl text-center cursor-pointer" tabindex="5" onclick="openSite('https://www.google.com')">
                <span class="text-4xl">🔍</span><br><b class="mt-4 block text-sm">Arama Yap</b>
            </div>
            <div class="nav-btn p-8 bg-slate-800 rounded-2xl text-center cursor-pointer" tabindex="6" onclick="toggleChat()">
                <span class="text-4xl">💬</span><br><b class="mt-4 block text-sm">Yapay Zekaya Sor</b>
            </div>
        </div>
    </div>

    <iframe id="content-frame"></iframe>

    <div id="stickman-container" onclick="toggleChat()">
        <div id="bubble" class="bubble">Selam reis! Bugün ne izliyoruz?</div>
        <lottie-player 
            src="https://assets10.lottiefiles.com/packages/lf20_5njpXv.json"  
            background="transparent"  
            speed="1"  
            style="width: 100%; height: 100%;"  
            loop  
            autoplay>
        </lottie-player>
    </div>

    <div id="chat-menu">
        <div class="flex justify-between items-center mb-4 border-b border-orange-500 pb-2">
            <h2 class="text-xl font-bold text-orange-500">Reis Sohbet (Turuncu)</h2>
            <button class="text-slate-500 hover:text-white" onclick="toggleChat()">✕</button>
        </div>
        <div id="chat-history" class="h-64 overflow-y-auto mb-4 space-y-3 text-sm pr-2">
            <p class="text-slate-400 italic text-center">Reis, benimle konuşmaya başla!</p>
        </div>
        <div class="flex gap-2">
            <input id="ai-input" type="text" placeholder="Bir şey yaz reis..." class="flex-1 p-3 rounded-full bg-slate-900 border border-slate-700 focus:border-orange-500 focus:outline-none text-white">
            <button onclick="askAI()" class="bg-orange-600 px-6 py-3 rounded-full font-bold hover:bg-orange-500">Sor</button>
        </div>
    </div>

    <script>
        // Siteyi Iframe içinde veya yeni sekmede açar
        function openSite(url) {
            const frame = document.getElementById('content-frame');
            const mainUi = document.getElementById('main-ui');

            // --- YOUTUBE/GOOGLE/NETFLIX SORUNUNU ÇÖZME ---
            if (url.includes("youtube.com") || url.includes("google.com") || url.includes("netflix.com")) {
                showBubble("Reis, bu site korumalı, o yüzden yeni sekmede patlatıyorum!");
                window.open(url, '_blank'); 
            } else {
                // Diğer siteleri (Manga vb.) içeride aç
                mainUi.style.display = 'none';
                frame.src = url;
                frame.style.display = 'block';
                showBubble("Hemen açıyorum reis!");
            }
        }

        // Sohbet Menüsünü Aç/Kapat
        function toggleChat() {
            const menu = document.getElementById('chat-menu');
            const stickmanBubble = document.getElementById('bubble');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
            if(menu.style.display === 'block') {
                document.getElementById('ai-input').focus();
                stickmanBubble.style.display = 'none'; // Menü açıkken baloncuğu gizle
            }
        }

        // Yapay Zekaya Soru Sor (GROQ API BAĞLANTISI)
        async function askAI() {
            const input = document.getElementById('ai-input');
            const history = document.getElementById('chat-history');
            if(!input.value) return;

            const userText = input.value;
            // Kullanıcı mesajını ekle
            history.innerHTML += `<div class="bg-slate-700 p-3 rounded-lg text-right ml-10 mb-2"><b>Sen:</b> ${userText}</div>`;
            input.value = "";
            history.scrollTop = history.scrollHeight;

            try {
                // --- GERÇEK API ÇAĞRISI (GROQ) ---
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer AIzaSyB4tdz_KKFET5GxO4_M5VI8VEfhMdQDmmg", // Senin API Key
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192", // Hızlı ve zeki model
                        messages: [
                            { 
                                role: "system", 
                                content: "Sen Alan Becker'ın turuncu çöp adamısın. Adın Turuncu. Kullanıcıya 'Reis' diye hitap et. Esprili, enerjik ve biraz yaramaz ol. Eğer kullanıcı bir site açmanı isterse cevabında mutlaka 'AÇILIYOR:' kelimesini ve sitenin URL'sini kullan." 
                            },
                            { role: "user", content: userText }
                        ]
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                // AI Cevabını Ekrana Bas
                history.innerHTML += `<div class="bg-orange-900 p-3 rounded-lg text-left mr-10 mb-2"><b>Turuncu:</b> ${aiResponse}</div>`;
                history.scrollTop = history.scrollHeight;
                showBubble(aiResponse);

                // --- OTOMATİK SİTE AÇMA MANTIĞI ---
                if (aiResponse.includes("AÇILIYOR:")) {
                    const url = aiResponse.split("AÇILIYOR:")[1].trim();
                    setTimeout(() => openSite(url), 2000); // 2 saniye sonra aç
                }

            } catch (error) {
                history.innerHTML += `<div class="text-red-500 italic text-xs text-center p-2 bg-red-950 rounded mb-2">Hata: API anahtarı geçersiz veya bağlantı koptu reis.</div>`;
            }
        }

        // Baloncuğu Göster
        function showBubble(text) {
            const b = document.getElementById('bubble');
            const chatMenu = document.getElementById('chat-menu');
            if(chatMenu.style.display === 'block') return; // Menü açıkken baloncuk çıkmasın

            b.innerText = text;
            b.style.display = 'block';
            // 6 saniye sonra baloncuğu gizle
            setTimeout(() => b.style.display = 'none', 6000);
        }

        // TV Kumandası için Tuş Desteği
        document.addEventListener('keydown', (e) => {
            // Esc tuşu ile ana sayfaya dön
            if(e.key === 'Escape') location.reload();
            // Enter tuşu ile AI menüsünde soruyu sor
            if(e.key === 'Enter' && document.activeElement.id === 'ai-input') askAI();
        });
    </script>
</body>
</html>
