<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reis Browser v4 - Sınırsız</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f172a; color: white; }
        
        /* Üst Bar */
        #nav-bar { height: 60px; background: #1e293b; display: flex; align-items: center; padding: 0 15px; border-bottom: 2px solid #ff6600; gap: 10px; z-index: 50; }
        #url-bar { flex: 1; background: #0f172a; border: 1px solid #334155; color: white; padding: 10px 20px; border-radius: 20px; outline: none; }
        .nav-btn { background: #ff6600; color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; }

        /* Ana Alan */
        #content-container { width: 100%; height: calc(100vh - 60px); position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* GİZLİ AI PANELİ */
        #ai-sidebar {
            position: fixed; right: -350px; top: 0; width: 350px; height: 100%;
            background: #1e293b; border-left: 3px solid #ff6600; transition: 0.3s ease;
            z-index: 200; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        #ai-sidebar.open { right: 0; }
        
        /* Sağdaki Tetikleyici Buton */
        #ai-toggle-handle {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            background: #ff6600; color: white; padding: 15px 5px; border-radius: 10px 0 0 10px;
            cursor: pointer; z-index: 150; font-weight: bold; opacity: 0.3; transition: 0.3s;
        }
        #ai-toggle-handle:hover { opacity: 1; padding-right: 10px; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 12px; font-size: 14px; }
        .user-msg { background: #334155; text-align: right; margin-left: 20px; }
        .ai-msg { background: #ff6600; margin-right: 20px; }

        #home-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="nav-bar">
        <button class="nav-btn" onclick="goHome()">🏠</button>
        <input id="url-bar" type="text" placeholder="Site ismi yaz (örn: asurascans.com) veya ara...">
        <button class="nav-btn" onclick="browse()">GİT</button>
    </div>

    <div id="content-container">
        <div id="home-screen">
            <h1 class="text-5xl font-black mb-4">REİS <span class="text-orange-500">GO</span></h1>
            <p class="text-slate-400 mb-8">Google engelini aşmak için kutuya site ismini yaz ve GİT'e bas.</p>
            <div class="flex gap-4">
                <button onclick="quick('asurascans.com')" class="bg-slate-800 p-4 rounded-xl hover:bg-green-600 transition">📚 Mangalar</button>
                <button onclick="quick('filmizle.com')" class="bg-slate-800 p-4 rounded-xl hover:bg-red-600 transition">🎬 Film İzle</button>
            </div>
        </div>
        <iframe id="main-frame" name="main-frame"></iframe>
    </div>

    <div id="ai-toggle-handle" onclick="toggleAI()">AI</div>

    <div id="ai-sidebar">
        <div class="p-4 bg-orange-600 font-bold flex justify-between items-center">
            <span>Hafızalı Gemini</span>
            <button onclick="toggleAI()">✕</button>
        </div>
        <div id="chat-flow"></div>
        <div class="p-4 bg-slate-800 border-t border-slate-700">
            <div class="flex gap-2">
                <input id="chat-input" type="text" placeholder="Sor reis..." class="flex-1 bg-slate-900 p-2 rounded text-white outline-none">
                <button onclick="askAI()" class="bg-orange-600 p-2 rounded">🚀</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyB4tdz_KKFET5GxO4_M5VI8VEfhMdQDmmg";
        let history = []; // Gemini Hafızası

        function browse() {
            let val = document.getElementById('url-bar').value;
            if(!val) return;

            // --- GOOGLE ENGELİ ÇÖZÜMÜ ---
            // Eğer Google/YouTube yazıldıysa uyarı ver ve yeni sekmede aç (Çünkü iframe izin vermez)
            if(val.includes("google.com") || val.includes("youtube.com")) {
                alert("Reis, Google ve YouTube güvenlik nedeniyle bu kutuda açılmaz. Onları mecburen yeni sekmede açıyorum.");
                window.open(val.startsWith("http") ? val : "https://"+val, "_blank");
                return;
            }

            if(!val.includes(".")) val = "https://www.bing.com/search?q=" + val; // Bing iframe'e izin verebilir
            else if(!val.startsWith("http")) val = "https://" + val;

            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('main-frame').src = val;
        }

        function goHome() { document.getElementById('home-screen').style.display = 'flex'; document.getElementById('main-frame').src = ""; }
        function quick(u) { document.getElementById('url-bar').value = u; browse(); }
        function toggleAI() { document.getElementById('ai-sidebar').classList.toggle('open'); }

        async function askAI() {
            const input = document.getElementById('chat-input');
            const flow = document.getElementById('chat-flow');
            const txt = input.value;
            if(!txt) return;

            flow.innerHTML += `<div class="msg user-msg">${txt}</div>`;
            input.value = "";
            
            history.push({ role: "user", parts: [{ text: txt }] });

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ contents: history })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                flow.innerHTML += `<div class="msg ai-msg">${reply}</div>`;
                history.push({ role: "model", parts: [{ text: reply }] });
                flow.scrollTop = flow.scrollHeight;
            } catch(e) {
                flow.innerHTML += `<div class="msg ai-msg">Hata: API anahtarını kontrol et reis.</div>`;
            }
        }

        document.getElementById('chat-input').addEventListener('keypress', e => e.key === 'Enter' && askAI());
        document.getElementById('url-bar').addEventListener('keypress', e => e.key === 'Enter' && browse());
    </script>
</body>
</html>
