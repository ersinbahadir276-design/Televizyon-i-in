<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Game Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        body { background: #000; height: 100vh; width: 100vw; font-family: sans-serif; }

        /* --- OYUN ALANI --- */
        #game-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        iframe {
            width: 100%; height: 100%; border: none; display: block;
        }

        /* --- MENU (Oyun Baslayinca Gizlenir) --- */
        #menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }

        h1 { color: white; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        .btn {
            background: #e74c3c; color: white;
            padding: 20px 40px; font-size: 24px; font-weight: bold;
            border: 4px solid #c0392b; border-radius: 10px;
            cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
            transition: 0.2s;
            margin-bottom: 10px;
        }
        .btn:hover, .btn:focus {
            background: #ff5e57; transform: scale(1.1);
            outline: none; box-shadow: 0 0 40px rgba(255, 94, 87, 0.8);
        }

        .info { color: #aaa; margin-top: 15px; font-size: 14px; max-width: 600px; text-align: center; }

        /* --- GIZLI MOD --- */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Oyun Buraya Yuklenir -->
    <div id="game-container">
        <!-- 
           sandbox ozellikleri kaldirildi, mouse kilidi icin tam yetki verildi.
           allow="pointer-lock" cok onemli.
        -->
        <iframe id="gameFrame" 
            src=""
            allow="autoplay; fullscreen; pointer-lock; microphone; camera; midi; geolocation; gyroscope; magnetometer; accelerometer"
            allowfullscreen>
        </iframe>
    </div>

    <!-- Baslangic Menusu -->
    <div id="menu-overlay">
        <h1>TV Oyun Konsolu</h1>
        <button class="btn" onclick="startGame()">OYUNU BAŞLAT</button>
        <p class="info">
            Başlat'a bastıktan sonra Mouse/Ok kaybolacak.<br>
            Kumanda tuşları direkt oyuna gidecek.<br>
            Çıkmak için kumandadan 'Geri' tuşuna basılı tutun.
        </p>
    </div>

    <script>
        const frame = document.getElementById('gameFrame');
        const menu = document.getElementById('menu-overlay');

        function startGame() {
            // 1. Oyunu Yukle
            // Google Translate hilesi olmadan direkt yukluyoruz ki tuslar karismasin
            // Eger engel varsa translate linkini geri koyabiliriz.
            frame.src = "https://moomoo.io"; 

            // 2. Menuyu Gizle
            menu.classList.add('hidden');

            // 3. TAM EKRAN ve MOUSE KILITLEME (Pointer Lock)
            // Bu islem TV tarayicisinin "Sanal Mouse"unu oldurur.
            document.documentElement.requestFullscreen().then(() => {
                // Tam ekrana gectikten sonra mouse'u kilitlemeyi dene
                // Not: iframe icine odaklandigi icin iframe kendi pointer lock'ini isteyebilir.
                frame.focus();
            }).catch(err => {
                console.log("Tam ekran hatasi:", err);
                frame.focus(); // Tam ekran olmazsa bile odakla
            });
        }

        // Mouse/Ok tusu ekrandan kacarsa geri yakala
        document.body.addEventListener('click', () => {
            if(menu.classList.contains('hidden')) {
                frame.focus();
            }
        });

        // Eger oyun "Mouse Goster" derse veya pointer lock bozulursa
        // tekrar odaklamaya calis.
        setInterval(() => {
            if(menu.classList.contains('hidden') && document.activeElement !== frame) {
                frame.focus();
            }
        }, 2000);

        // Kumanda Geri Tusu Yakalama (Menu'yu geri getir)
        window.addEventListener('keydown', (e) => {
            // ESC veya TV Geri Tusu
            if(e.keyCode === 27 || e.keyCode === 461 || e.keyCode === 10009) {
                document.exitFullscreen();
                menu.classList.remove('hidden');
                frame.src = ""; // Oyunu durdur
            }
        });
    </script>
</body>
</html>
