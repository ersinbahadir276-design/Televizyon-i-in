<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reis Sınırsız Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; }
        
        /* Modern Adres Çubuğu */
        #nav-bar {
            height: 65px; background: #1e293b; display: flex; align-items: center;
            padding: 0 20px; border-bottom: 3px solid #ff6600; gap: 15px; z-index: 1000;
        }

        #url-bar {
            flex: 1; background: #0f172a; border: 2px solid #334155; color: white;
            padding: 12px 25px; border-radius: 30px; outline: none; font-size: 16px;
            transition: all 0.3s;
        }

        #url-bar:focus { border-color: #ff6600; box-shadow: 0 0 15px rgba(255,102,0,0.3); }

        .btn {
            background: #ff6600; color: white; padding: 10px 20px; border-radius: 12px;
            font-weight: bold; cursor: pointer; border: none; transition: 0.2s;
        }

        .btn:hover { background: #e65c00; transform: scale(1.05); }

        /* Ana Ekran */
        #browser-container { width: 100%; height: calc(100vh - 65px); background: #fff; }
        
        /* WebView (Embed) */
        #web-view { width: 100%; height: 100%; border: none; }

        /* Başlangıç Sayfası */
        #start-page {
            position: absolute; top: 65px; left: 0; width: 100%; height: calc(100vh - 65px);
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500;
        }
    </style>
</head>
<body>

    <div id="nav-bar">
        <button class="btn" onclick="goHome()">🏠</button>
        <input id="url-bar" type="text" placeholder="Site adresi veya Google araması yaz reis...">
        <button class="btn" onclick="loadContent()">GİT</button>
        <button class="btn" style="background:#475569" onclick="refresh()">🔄</button>
    </div>

    <div id="browser-container">
        <div id="start-page">
            <h1 class="text-7xl font-black text-orange-500 mb-4 tracking-tighter">REİS GO</h1>
            <p class="text-slate-400 text-xl mb-10">Sınır yok, engel yok, yeni sekme yok.</p>
            
            <div class="grid grid-cols-3 gap-6">
                <button onclick="quick('google.com')" class="p-6 bg-white/5 border border-white/10 rounded-2xl hover:bg-orange-600 transition text-3xl">🔍</button>
                <button onclick="quick('youtube.com')" class="p-6 bg-white/5 border border-white/10 rounded-2xl hover:bg-red-600 transition text-3xl">🎥</button>
                <button onclick="quick('asurascans.com')" class="p-6 bg-white/5 border border-white/10 rounded-2xl hover:bg-green-600 transition text-3xl">📖</button>
            </div>
        </div>
        <iframe id="web-view" src=""></iframe>
    </div>

    <script>
        const urlBar = document.getElementById('url-bar');
        const webView = document.getElementById('web-view');
        const startPage = document.getElementById('start-page');

        // REİS'İN SIRRI: PROXY SERVİSİ
        // Bu servis siteleri senin yerine çeker ve iframe engelini aşar.
        const proxyPrefix = "https://api.allorigins.win/raw?url="; 
        // Alternatif (Daha güçlü): "https://corsproxy.io/?"

        function loadContent(targetUrl = null) {
            let val = targetUrl || urlBar.value;
            if (!val) return;

            // URL Temizleme
            if (!val.includes('.') || val.includes(' ')) {
                val = "https://www.google.com/search?q=" + encodeURIComponent(val);
            } else {
                if (!val.startsWith('http')) val = "https://" + val;
            }

            startPage.style.display = 'none';
            
            // ÇOK KRİTİK: Bazı siteler için proxy kullanıyoruz, bazıları direkt açılır
            // Eğer site büyükse (Youtube/Google) direkt iframe'e basıyoruz ama 
            // Televizyonda sorun çıkarırsa proxyPrefix + val şeklinde deneyeceğiz.
            webView.src = val; 
            urlBar.value = val;
        }

        function goHome() {
            startPage.style.display = 'flex';
            webView.src = "";
            urlBar.value = "";
        }

        function refresh() {
            webView.contentWindow.location.reload();
        }

        function quick(site) {
            loadContent(site);
        }

        urlBar.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadContent();
        });

        // TV Kumandası Geri Tuşu (Esc)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') goHome();
        });
    </script>
</body>
</html>
